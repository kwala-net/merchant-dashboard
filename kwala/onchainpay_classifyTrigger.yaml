# Workflow: onchainpay_classifyTrigger
#
# Listens for every PaymentReceived event on the MerchantPayments contract and
# immediately calls classifyPayment(bytes32 paymentId) — the self-classifying
# overload (onlyOperator) — which reads the classification already stored by
# receivePayment() and emits PaymentClassified on-chain.
#
# Prerequisites
# ─────────────
# • Kwala's executor smart-wallet must be granted the operator role:
#     mp.addOperator(<kwala-executor-address>)
# • Replace 0x1111...1111 with the real deployed MerchantPayments address.
# • Replace the TriggerSourceContractABI / RecurringSourceContractABI values
#   with the base64-encoded ABI of the deployed contract (foundry/out/MerchantPayments.sol/MerchantPayments.json).

Name: onchainpay_classifyTrigger
Trigger:
  TriggerSourceContract: "0x1111111111111111111111111111111111111111"
  TriggerChainID: 11155111
  TriggerEventName: PaymentReceived(bytes32,address,address,uint256,address,uint256)
  TriggerEventFilter: NA
  TriggerSourceContractABI: 
  TriggerPrice: NA
  RecurringSourceContract: "0x1111111111111111111111111111111111111111"
  RecurringChainID: 11155111
  RecurringEventName: PaymentReceived(bytes32,address,address,uint256,address,uint256)
  RecurringEventFilter: NA
  RecurringSourceContractABI: 
  RecurringPrice: NA
  RepeatEvery: event
  ExecuteAfter: event
  ExpiresIn: 1782900510
  Meta: NA
  ActionStatusNotificationPOSTURL: NA
  ActionStatusNotificationAPIKey: NA
Actions:
  - Name: classify_payment
    Type: call
    APIEndpoint: NA
    APIPayload:
      Message: NA
    TargetContract: "0x1111111111111111111111111111111111111111"
    # classifyPayment(bytes32) — self-classifying overload, onlyOperator
    # re.event(0) = paymentId (first indexed param of PaymentReceived)
    TargetFunction: function classifyPayment(bytes32 paymentId)
    TargetParams:
      - re.event(0)
    ChainID: 11155111
    EncodedABI: NA
    Bytecode: NA
    EncodedGoContract: NA
    Metadata: NA
    RetriesUntilSuccess: 5
    SmartWallet: DEFAULT_SMART_WALLET
Execution:
  Mode: parallel
