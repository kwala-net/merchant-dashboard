# Workflow: onchainpay_postsync
#
# Listens for every PaymentClassified event on the MerchantPayments contract
# and fires two POST actions in parallel:
#   1. POST /api/payments/sync  — writes the classified payment to the offchain DB
#   2. POST /api/webhook/kwala  — notifies the merchant's system (5 retries for resilience)
#
# PaymentClassified event params:
#   [0] paymentId      bytes32 indexed
#   [1] classification uint8   (0=UNCLASSIFIED 1=STANDARD 2=HIGH_VALUE 3=SUSPICIOUS 4=BLOCKED)
#   [2] merchant       address indexed
#   [3] amount         uint256
#
# TODO: Populate APIPayload.Message for each action with the event fields your
#       API endpoints expect. Kwala supports re.event(N) interpolation in payloads.
#       Example for sync_to_db:
#         Message: '{"paymentId":"re.event(0)","classification":"re.event(1)","merchant":"re.event(2)","amount":"re.event(3)"}'
#
# Replace 0x1111...1111 with the real deployed MerchantPayments address.
# Replace https://example.com with your actual Next.js app base URL.

Name: onchainpay_postsync
Trigger:
  TriggerSourceContract: "0x1111111111111111111111111111111111111111"
  TriggerChainID: 11155111
  TriggerEventName: PaymentClassified(bytes32,uint8,address,uint256)
  TriggerEventFilter: NA
  TriggerSourceContractABI: 
  TriggerPrice: NA
  RecurringSourceContract: "0x1111111111111111111111111111111111111111"
  RecurringChainID: 11155111
  RecurringEventName: PaymentClassified(bytes32,uint8,address,uint256)
  RecurringEventFilter: NA
  RecurringSourceContractABI: 
  RecurringPrice: NA
  RepeatEvery: event
  ExecuteAfter: event
  ExpiresIn: 1782900519
  Meta: NA
  ActionStatusNotificationPOSTURL: NA
  ActionStatusNotificationAPIKey: NA
Actions:
  - Name: sync_to_db
    Type: post
    APIEndpoint: "https://example.com/api/payments/sync"
    APIPayload:
      # Populate with event fields — re.event(N) interpolates the Nth param of PaymentClassified:
      #   re.event(0) = paymentId (bytes32)
      #   re.event(1) = classification (uint8: 1=STANDARD 2=HIGH_VALUE 3=SUSPICIOUS)
      #   re.event(2) = merchant (address)
      #   re.event(3) = amount (uint256)
      # Also add dbSynced and webhookDelivered booleans required by recordSync() on-chain.
      Message: "{}"
    TargetContract: NA
    TargetFunction: NA
    TargetParams: NA
    ChainID: NA
    EncodedABI: NA
    Bytecode: NA
    EncodedGoContract: NA
    Metadata: NA
    RetriesUntilSuccess: 3
    SmartWallet: NA
  - Name: notify_merchant
    Type: post
    APIEndpoint: "https://example.com/api/webhook/kwala"
    APIPayload:
      # Minimum fields required by /api/webhook/kwala:
      #   paymentId, event ("PaymentClassified"), data, signature
      Message: "{}"
    TargetContract: NA
    TargetFunction: NA
    TargetParams: NA
    ChainID: NA
    EncodedABI: NA
    Bytecode: NA
    EncodedGoContract: NA
    Metadata: NA
    RetriesUntilSuccess: 5
    SmartWallet: NA
Execution:
  Mode: parallel
